<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex">
    <div class="hidden md:flex w-1/2 bg-emerald-600 items-center justify-center relative overflow-hidden">
        <div class="absolute w-64 h-64 bg-emerald-500 rounded-full opacity-50 -top-10 -left-10"></div>
        <div class="absolute w-96 h-48 bg-emerald-700 rounded-lg opacity-50 bottom-20"></div>
        <div class="z-10 text-white font-bold text-4xl text-left pl-10">
            <h1 class="mb-2">TeamSync</h1>
            <p class="text-sm font-normal">Quản lý dự án hiệu quả</p>
        </div>
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center bg-white">
        <div class="w-full max-w-md p-8">
            <h2 class="text-3xl font-bold mb-2 text-gray-800">Welcome back</h2>
            <p class="text-gray-500 mb-8">Please enter your details to sign in to your account</p>
            
            <form action="/dashboard">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-emerald-500" type="email" placeholder="name@company.com">
                </div>
                <div class="mb-6 relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password <a href="#" class="float-right text-emerald-600 text-sm font-normal">Forgot?</a></label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-emerald-500" type="password" placeholder="••••••••">
                </div>
                <div class="mb-6 flex items-center">
                    <input type="checkbox" class="mr-2 leading-tight" id="remember">
                    <label class="text-sm text-gray-700" for="remember">Remember me for 30 days</label>
                </div>
                <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded w-full mb-4">
                    Sign In
                </button>
                <button type="button" class="border border-gray-300 text-gray-700 font-bold py-2 px-4 rounded w-full flex items-center justify-center">
                    Sign in with Google
                </button>
                <p class="text-center text-sm text-gray-500 mt-4">Don't have an account? <a href="#" class="text-emerald-600">Sign up for free</a></p>
            </form>
        </div>
    </div>
</body>
</html>
