<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSync - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white p-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-xl flex items-center gap-2"><span class="bg-slate-800 text-white px-2 py-1 rounded">T</span> TeamSync</div>
        <div class="flex items-center gap-4">
            <button class="text-gray-500">🔔</button>
            <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
        </div>
    </nav>

    <div class="p-8 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button class="bg-emerald-500 text-white px-4 py-2 rounded font-semibold">+ New Project</button>
            <div class="flex gap-4">
                <input type="text" placeholder="Search projects..." class="border p-2 rounded w-64">
                <select class="border p-2 rounded"><option>Filter</option></select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <div class="text-gray-500 text-2xl mb-2">💻</div>
                <h3 class="font-bold text-lg">Web Design</h3>
                <p class="text-gray-400 text-sm mb-4">Due: 25 Jan</p>
                <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Progress</span><span>75%</span></div>
                <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-slate-800 h-2 rounded-full" style="width: 75%"></div></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <div class="text-gray-500 text-2xl mb-2">📱</div>
                <h3 class="font-bold text-lg">Mobile App</h3>
                <p class="text-gray-400 text-sm mb-4">Due: 10 Feb</p>
                <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Progress</span><span>40%</span></div>
                <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-slate-800 h-2 rounded-full" style="width: 40%"></div></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <div class="text-gray-500 text-2xl mb-2">📢</div>
                <h3 class="font-bold text-lg">Marketing</h3>
                <p class="text-gray-400 text-sm mb-4">Due: 05 Mar</p>
                <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Progress</span><span>20%</span></div>
                <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-slate-800 h-2 rounded-full" style="width: 20%"></div></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <div class="text-gray-500 text-2xl mb-2">🗄️</div>
                <h3 class="font-bold text-lg">Migration</h3>
                <p class="text-gray-400 text-sm mb-4">Due: 20 Dec</p>
                <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Progress</span><span>90%</span></div>
                <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-slate-800 h-2 rounded-full" style="width: 90%"></div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h3 class="font-bold mb-4">Project Overview</h3>
                <canvas id="projectChart" height="100"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h3 class="font-bold mb-4">Team Status</h3>
                <ul class="space-y-4">
                    <li class="flex items-center gap-3"><div class="w-8 h-8 bg-gray-200 rounded-full"></div><span>Sarah</span></li>
                    <li class="flex items-center gap-3"><div class="w-8 h-8 bg-gray-200 rounded-full"></div><span>John</span></li>
                    <li class="flex items-center gap-3"><div class="w-8 h-8 bg-gray-200 rounded-full"></div><span>Emily</span></li>
                </ul>
                <div class="mt-8 text-center"><a href="/taskboard" class="text-emerald-500 hover:underline">Go to Task Board &rarr;</a></div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('projectChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Activity',
                    data: [12, 19, 15, 25, 22, 10, 14],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                scales: { y: { beginAtZero: true } },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
